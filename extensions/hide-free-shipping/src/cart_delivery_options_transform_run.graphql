# All config (including which rate names to hide) lives on the DISCOUNT's
# settings metafield. The delivery API can't read the discount code, but each
# line's discountApplication exposes that discount's metafield — so we read the
# rate names straight from the offer that triggered the cart. No separate config.
query Input {
  cart {
    lines {
      discountAllocations {
        discountApplication {
          # Non-null only when this allocation comes from OUR free-item discount
          # (it's the only discount carrying this app-reserved metafield). Its
          # value is the discount's full config JSON, which also holds the
          # merchant-edited `hideRateNames` from the discount settings form.
          freeItemConfig: metafield(
            namespace: "$app:vip-free-item"
            key: "function-configuration"
          ) {
            value
          }
        }
      }
    }
    deliveryGroups {
      deliveryOptions {
        handle
        title
      }
    }
  }
}
